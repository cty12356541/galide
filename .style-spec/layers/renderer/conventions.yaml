# .style-spec/layers/renderer/conventions.yaml
# Renderer 层（React 前端）约定

architecture:
  pattern: "Feature-based folder structure"
  description: "每个功能模块在 features/ 下有独立目录，包含 components/ store/ hooks/"

state_management:
  local_ui_state: "React useState / useReducer（组件内部）"
  shared_ui_state: "Zustand store（如当前项目、编辑器状态）"
  server_state: "React Query（AI 任务状态、Git 状态）"

component_rules:
  - "每个 React 组件文件名为 PascalCase.tsx"
  - "纯展示组件放在 features/*/components/，数据逻辑通过 props 传入"
  - "有状态的组件用 useXxx hook 封装逻辑"
  - "禁止在组件内直接调用 IPC，使用 custom hook 封装"

ipc_abstraction:
  - "所有 IPC 调用封装在 src/renderer/lib/ipc/ 目录下"
  - "每个 IPC 通道有对应 hooks：如 useGitStatus(), useProjectOpen()"
  - "错误通过 zustand 的 error store 集中管理"

key_hooks:
  - "useProject(): 返回当前打开的项目信息"
  - "useScriptEditor(): 返回 CodeMirror 编辑器实例"
  - "useFlowView(): 返回 React Flow 实例"
  - "usePreview(): 返回 PixiJS 预览实例"
  - "useGitStatus(): 返回当前 git 状态"
  - "useAiTask(): 返回当前 AI 任务队列"

