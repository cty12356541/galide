# .style-spec/layers/dsl/conventions.yaml
# gal DSL 语言层约定

design_principles:
  - "纯文本行级语义：每行要么是元数据、要么是对白、要么是控制流"
  - "无多行块语法：不用 JSON/YAML 的多行字符串，保护 git diff 线性"
  - "显式符号标记层级：=== 用于章节，-> 用于跳转，* 用于选项"
  - "UTF-8 字符集，无隐藏控制符"
  - "资产引用用相对路径，不允许内联二进制"

line_types:
  - "元数据行: # 章节, ## 场景, 背景:, BGM:"
  - "对白行: 角色名: \"内容\""
  - "选项行: * \"选项文本\" -> 目标节点 [当: 条件表达式]"
  - "设变量行: 设: name = value | 设: name += n | 设: name -= n"
  - "条件块: [若: expr] ... [否则若: expr] ... [否则] ... [若终]"
  - "控制行: === 节点名 ===, [跳转:节点名]"
  - "立绘行: [角色:名字 | 立绘:asset.png | 位置:左]"
  - "注释行: // 注释内容"

variable_conditional_syntax:
  set:
    forms:
      - "设: affinity = 10"
      - "设: affinity += 5"
      - "设: flag = true"
      - "设: name = \"hero\""
    ast: "SetNode { name, op: set|add|sub, value: Expression }"
  conditional_block:
    forms:
      - "[若: affinity >= 10]"
      - "[否则若: affinity >= 5]"
      - "[否则]"
      - "[若终]"
    ast: "IfNode { branches: IfBranch[] }"
  conditional_choice:
    form: "* \"秘密路线\" -> 结局A [当: affinity >= 10]"
    ast: "ChoiceOption.condition?: Expression"
  expression:
    literals: "numbers, booleans (true/false), quoted strings"
    operators: "==, !=, <, <=, >, >=, and, or, not, parentheses"
    variables: "identifier refs (e.g. affinity, flag_met)"
    evaluator: "shared/dsl/expression.ts — no eval()"

parser_requirements:
  - "词法分析器(Lexer)输出 Token[]，包含 type + value + line + column"
  - "语法分析器(Parser)输出 AST，必须包含：nodes(Node[]), errors(ParseError[])"
  - "解析失败不抛异常，返回结构化错误（含 line/column）"
  - "AST 节点类型：ScriptNode, DialogueNode, ChoiceNode, SceneNode, GotoNode"

ast_node_types:
  - "ScriptNode: { type: 'script', children: Node[] }"
  - "SceneNode: { type: 'scene', id: string, background?: string, bgm?: string, children: Node[] }"
  - "DialogueNode: { type: 'dialogue', character: string, sprite?: string, position?: string, lines: string[] }"
  - "ChoiceNode: { type: 'choice', options: { text: string, target: string, condition?: Expression }[] }"
  - "SetNode: { type: 'set', name: string, op: set|add|sub, value: Expression }"
  - "IfNode: { type: 'if', branches: IfBranch[] }"
  - "GotoNode: { type: 'goto', target: string }"

