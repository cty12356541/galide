      ## 11 个缺失文件(分类 + 路径)
      ### 共享基础(2 个,Phase 1 必做)
      1. `src/shared/workspace-layout.ts` — `WorkspaceLayout` / `ActivityBarItemId` / `RightDockId` / `CenterTabId` / `WorkspacePresetId` 5 个 type,`DEFAULT_WORKSPACE_LAYOUT` / `applyWorkspacePreset(preset, current)` / `mergeWorkspaceLayout(saved, defaults)` 3 个函数。
      2. `src/renderer/src/lib/workspace-layout.ts` — re-export from shared,方便 vite 路径。

      ### Main 端 handler(2 个,Phase 2)
      3. `src/main/ipc/asset-handlers.ts` — 导出 `registerAssetHandlers(ipcMain, deps)`。覆盖 `galide.asset.{list,read,create,update,delete,scan}` 6 个 IPC 通道。底层 deps 应接受 `workspace: { projectRoot: string }` 注入。**返回 schema 必须跟 preload `asset.read/write` 类型一致**(看 `src/preload/index.ts:160-180` 范围,反推)。
      4. `src/main/ipc/workspace-handlers.ts` — 导出 `registerWorkspaceHandlers(ipcMain, deps)`。覆盖 `galide.workspace.{readProject,writeProject,readGlobal,writeGlobal}` 4 个 IPC 通道。读 / 写 `~/.galide/workspace/<projectId>.json` 和 `~/.galide/workspace/global.json`,schema 用 `WorkspaceLayout`。

      ### Renderer hook(2 个,Phase 3)
      5. `src/renderer/src/lib/ipc/use-workspace.ts` — 导出 `useWorkspacePersistence()`,返回 `{ hydrate: (projectPath) => Promise<WorkspaceLayout | null>, persistProject: (projectPath, layout) => Promise<void>, persistGlobal: (layout) => Promise<void> }`。`beforeunload` 时调 `persistGlobal(layout)` 兜底。
      6. `src/renderer/src/lib/ipc/use-appearance-effect.ts` — 导出 `useAppearanceEffect()`,监听 `useUiStore.theme`,`document.documentElement.classList.toggle('dark', theme === 'dark')`。

      ### UI 组件(5 个,Phase 4)
