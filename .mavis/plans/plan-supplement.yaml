      2. Phase 2: 写 2 个 main handler → 跑 `bun tsc --noEmit -p tsconfig.node.json` → 4 个 node 错应全消。
      3. Phase 3: 写 2 个 renderer hook → 跑 `bun tsc --noEmit -p tsconfig.web.json` → 应少 3 错(use-workspace / use-appearance-effect / store 那条)。
      4. Phase 4: 写 4 个 UI 组件 + OutlinePanel → 跑 `bun tsc --noEmit -p tsconfig.web.json` → 应**全 0 错**。
