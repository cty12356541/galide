      ## 实施原则
      - **从诊断报告反推接口**:报告第 4 节"TypeScript 编译错清单"是权威。每个 import 路径都对应一个 file:line,反推 import 处的用法(`(s: T) => T.x.y` 反推 y 字段类型)。
      - **参考 a1e91f8 已有组件形态**:git show a1e91f8:src/renderer/src/components/StatusBar.tsx 看老 StatusBar 怎么写;git show a1e91f8:src/renderer/src/features/character/CharacterListPanel.tsx 看老 panel 怎么写。9 commit 的设计意图保留,但**实现要 1:1 够用 + 真能渲染**。
      - **依赖注入 + 容错**:handler 端要 catch error 返回 `{ ok: false, error: ... }`,不要 throw。renderer 端用 `window.galide?.X?.Y` 防御性访问(参考 `src/renderer/src/lib/ipc/galide-safe.ts`)。
      - **zustand store 字段必须真存在**:`activeActivity: ActivityBarItemId[]` / `openCenterTabs: CenterTabId[]` / `rightDock: RightDockId` / `dirtyMap: Record<ActivityBarItemId, boolean>` / `theme: 'light' | 'dark'` / `applyWorkspacePreset: (preset) => void`。store.ts 已有 `workspaceLayout` 字段就扩展,别新建。
      - **IPC channel 注册**:参考 `src/main/ipc/ipc-channels.ts`(adbf13e 加的),按现有命名约定。
      - **不开 vite dev 跑**(沙箱无 node,跑不通)。**靠 typecheck + 单测 + 静态验证**。

